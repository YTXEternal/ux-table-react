name: Publish to NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org/"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "尝试使用 OIDC (--provenance) 进行发布..."
          if npm publish --provenance --access public; then
            echo "OIDC发布成功"
          else
            echo "OIDC发布失败，尝试降级使用 Token 进行发布..."
            if npm publish --access public; then
              echo "Token发布成功"
            else
              echo "Token发布也失败了"
              exit 1
            fi
          fi
